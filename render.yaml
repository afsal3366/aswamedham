services:
  # 1. Redis Instance
  - type: redis
    name: space-guess-redis
    ipAllowList: [] # Only allow internal traffic
    plan: free

  # 2. Backend Service (FastAPI)
  - type: web
    name: space-guess-backend
    env: python
    buildCommand: cd space-guess/backend && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd space-guess/backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: space-guess-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  # 3. Frontend Service (Expo Static Web)
  - type: web
    name: space-guess-frontend
    env: static
    buildCommand: cd space-guess/frontend && npm install && npm run build
    staticPublishPath: space-guess/frontend/dist
    plan: free
    envVars:
      - key: BACKEND_URL
        value: https://space-guess-backend.onrender.com
