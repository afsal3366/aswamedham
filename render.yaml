services:
  # 1. Redis Instance
  - type: redis
    name: space-guess-redis
    ipAllowList: [] # Only allow internal traffic
    plan: free

  # 2. Backend Service (FastAPI)
  - type: web
    name: space-guess-backend
    env: python
    rootDir: space-guess/backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: space-guess-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  # 3. Frontend Service (Expo Static Web)
  - type: web
    name: space-guess-frontend
    env: static
    rootDir: space-guess/frontend
    buildCommand: npm install && npx expo export --platform web
    staticPublishPath: dist
    plan: free
    envVars:
      - key: BACKEND_URL
        value: https://space-guess-backend.onrender.com
