services:
  # 1. Redis Instance
  - type: redis
    name: space-guess-redis
    ipAllowList: [] # Only allow internal traffic
    plan: free

  # 2. Backend Service (FastAPI)
  - type: web
    name: space-guess-backend
    env: docker
    dockerContextDir: backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: REDIS_HOST
        fromService:
          type: redis
          name: space-guess-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: space-guess-redis
          property: port
      - key: REDIS_URL
        fromService:
          type: redis
          name: space-guess-redis
          property: connectionString

  # 3. Frontend Service (Nginx + React)
  - type: web
    name: space-guess-frontend
    env: docker
    dockerContextDir: frontend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: BACKEND_URL
        value: https://space-guess-backend.onrender.com
